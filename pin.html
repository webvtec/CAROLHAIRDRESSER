<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carol's Beauty — Admin PIN</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:#050A1A; --navy2:#080F22; --navy3:#0D1530;
  --violet:#7C3AED; --violet2:#6D28D9;
  --violetglow:rgba(124,58,237,0.25);
  --coral:#FF4D6D; --coralglow:rgba(255,77,109,0.2);
  --cyan:#00D4FF;
  --white:#FFFFFF; --offwhite:#E8EAF0;
  --dim:#8892B0; --dimmer:#4A5580;
  --line:rgba(124,58,237,0.18);
  --glassline:rgba(255,255,255,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Outfit',sans-serif;background:var(--navy);color:var(--offwhite);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}

/* Background glow orbs */
body::before{content:'';position:fixed;top:-20%;left:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(124,58,237,0.12) 0%,transparent 70%);pointer-events:none;}
body::after{content:'';position:fixed;bottom:-20%;right:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(0,212,255,0.08) 0%,transparent 70%);pointer-events:none;}

.card{background:var(--navy3);border:1px solid var(--line);border-radius:24px;padding:40px 32px 36px;width:100%;max-width:360px;margin:16px;position:relative;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.5);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--violet),var(--coral),var(--cyan));}

.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(120deg,var(--cyan),var(--violet),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px;}
.subtitle{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dimmer);text-align:center;margin-bottom:32px;font-family:'Syne',sans-serif;}

.pin-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);text-align:center;margin-bottom:16px;font-family:'Syne',sans-serif;}

/* PIN dots display */
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:28px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--dimmer);background:transparent;transition:all .2s;}
.pin-dot.filled{background:var(--violet);border-color:var(--violet);box-shadow:0 0 10px var(--violetglow);}
.pin-dot.error{background:var(--coral);border-color:var(--coral);box-shadow:0 0 10px var(--coralglow);}

/* Keypad */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.key{background:var(--navy2);border:1px solid var(--glassline);border-radius:14px;padding:18px 10px;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--offwhite);cursor:pointer;text-align:center;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent;}
.key:hover{background:rgba(124,58,237,0.12);border-color:var(--line);}
.key:active{transform:scale(0.93);background:rgba(124,58,237,0.22);}
.key.del{font-size:16px;color:var(--coral);}
.key.clr{font-size:11px;letter-spacing:1px;color:var(--dim);}

/* Status message */
.status-msg{text-align:center;font-size:12px;letter-spacing:1px;min-height:20px;transition:all .3s;}
.status-msg.error{color:var(--coral);}
.status-msg.success{color:var(--cyan);}

/* Shake animation */
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
.shake{animation:shake .4s ease;}

/* Topbar gradient line anim */
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--violet),var(--coral),var(--cyan),var(--violet));background-size:300% 100%;animation:gradShift 6s linear infinite;}
@keyframes gradShift{0%{background-position:0% 0;}100%{background-position:300% 0;}}
</style>
</head>
<body>

<div class="card" id="pinCard">
  <div class="brand">Carol's Beauty</div>
  <div class="subtitle">Admin Access</div>

  <div class="pin-label">Enter PIN</div>

  <div class="pin-display" id="pinDisplay">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div>
    <div class="pin-dot" id="d5"></div>
    <div class="pin-dot" id="d6"></div>
  </div>

  <div class="keypad">
    <div class="key" onclick="pressKey('1')">1</div>
    <div class="key" onclick="pressKey('2')">2</div>
    <div class="key" onclick="pressKey('3')">3</div>
    <div class="key" onclick="pressKey('4')">4</div>
    <div class="key" onclick="pressKey('5')">5</div>
    <div class="key" onclick="pressKey('6')">6</div>
    <div class="key" onclick="pressKey('7')">7</div>
    <div class="key" onclick="pressKey('8')">8</div>
    <div class="key" onclick="pressKey('9')">9</div>
    <div class="key clr" onclick="clearPin()">CLR</div>
    <div class="key" onclick="pressKey('0')">0</div>
    <div class="key del" onclick="deleteKey()">⌫</div>
  </div>

  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
  const CORRECT_PIN = '5464';
  let currentPin = '';

  function updateDisplay() {
    for (let i = 0; i < 7; i++) {
      const dot = document.getElementById('d' + i);
      dot.classList.remove('filled', 'error');
      if (i < currentPin.length) dot.classList.add('filled');
    }
  }

  function pressKey(digit) {
    if (currentPin.length >= 7) return;
    currentPin += digit;
    updateDisplay();
    if (currentPin.length === 7) {
      setTimeout(checkPin, 200);
    }
  }

  function deleteKey() {
    currentPin = currentPin.slice(0, -1);
    updateDisplay();
    setStatus('');
  }

  function clearPin() {
    currentPin = '';
    updateDisplay();
    setStatus('');
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg' + (type ? ' ' + type : '');
  }

  function checkPin() {
    if (currentPin === CORRECT_PIN) {
      setStatus('Access granted ✦', 'success');
      // Mark PIN access in sessionStorage then redirect
      sessionStorage.setItem('pinAccess', 'granted');
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 800);
    } else {
      // Flash dots red and shake
      for (let i = 0; i < 7; i++) {
        const dot = document.getElementById('d' + i);
        dot.classList.remove('filled');
        dot.classList.add('error');
      }
      document.getElementById('pinCard').classList.add('shake');
      setStatus('Incorrect PIN — try again', 'error');
      setTimeout(() => {
        document.getElementById('pinCard').classList.remove('shake');
        currentPin = '';
        updateDisplay();
        setStatus('');
      }, 1000);
    }
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') pressKey(e.key);
    else if (e.key === 'Backspace') deleteKey();
    else if (e.key === 'Escape') clearPin();
  });
</script>
</body>
</html>
